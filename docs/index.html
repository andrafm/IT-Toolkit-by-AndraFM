<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IT Toolkit by AndraFM_</title>
  <style>
    :root {
      --bg: #111822;
      --panel: #182332;
      --text: #e9f1f8;
      --muted: #9bb0c2;
      --accent: #59cdff;
      --line: #30475f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(89, 205, 255, 0.18), transparent 28%),
        linear-gradient(160deg, #0d141d 0%, #111822 48%, #16202d 100%);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: rgba(24, 35, 50, 0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3rem);
    }
    p {
      color: var(--muted);
      line-height: 1.6;
    }
    .cmd {
      margin-top: 20px;
      padding: 16px 18px;
      background: #0c1219;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow-x: auto;
      font-family: Consolas, "Courier New", monospace;
      color: var(--accent);
      white-space: pre-wrap;
      word-break: break-word;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>IT Toolkit</h1>
    <p>Launcher endpoint for the PowerShell toolkit.</p>
    <div class="cmd">irm "https://andrafirmansyah250699-ship-it.github.io/IT-Toolkit-by-AndraFM/i.ps1" | iex</div>
    <p>Repository: <a href="https://github.com/andrafirmansyah250699-ship-it/IT-Toolkit-by-AndraFM">github.com/andrafirmansyah250699-ship-it/IT-Toolkit-by-AndraFM</a></p>
  </main>
</body>
</html>
